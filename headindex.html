
<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Character Encoding -->
        <meta charset="UTF-8">

        <!-- Responsive Design -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Browser Compatibility -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <!-- SEO -->
        <title>Your Website Title</title>
        <meta name="description" content="Short description about your website.">
        <meta name="keywords" content="html, css, javascript, web design">
        <meta name="author" content="Your Name">

        <!-- Theme Color -->
        <meta name="theme-color" content="#ffffff">

        <!-- Robots -->
        <meta name="robots" content="index, follow">

        <!-- Open Graph (Facebook, LinkedIn etc.) -->
        <meta property="og:title" content="Your Website Title">
        <meta property="og:description" content="Short description about your website.">
        <meta property="og:image" content="images/preview.jpg">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://yourwebsite.com">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Your Website Title">
        <meta name="twitter:description" content="Short description about your website.">
        <meta name="twitter:image" content="images/preview.jpg">

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="images/favicon.png">

        <!-- Apple Touch Icon -->
        <link rel="apple-touch-icon" href="images/favicon.png">

        <!-- Canonical URL -->
        <link rel="canonical" href="https://yourwebsite.com">

        <!-- Preconnect for Faster Font Loading -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        <!-- CSS Files -->
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/responsive.css">

        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!-- AOS Animation Library -->
        <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">

        <!-- Defer JavaScript -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <!-- <script defer src="js/script.js"></script> -->

        <!-- AOS Script -->
        <script defer src="https://unpkg.com/aos@next/dist/aos.js"></script>

        <script defer src="/js/javascript.js"></script>
    </head>
    <body>

    </body>
</html>
